name: terraform-plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform -chdir=infra/terraform/environments/dev fmt -check -recursive
      - name: Terraform init
        run: terraform -chdir=infra/terraform/environments/dev init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/terraform/environments/dev validate

